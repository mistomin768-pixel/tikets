<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/tickets/src/style.css">
    <title>tickets</title>
  </head>
  <body>
    <nav class="nav">
      <div class="nav-top">
        <div class="logo"><img src="/tickets/src/assets/logo.png" alt=""></div>
      <h1 class="title">FIND BEST EVENTS AROUND THE WORLD</h1>
      </div>
      
      <div class="search-choose">
        <input type="text" class="search">
        <button class="choose">Choose country</button>
      </div>
    </nav>
    <main class="main">
      <div class="main-div">
        <div class="card">
          <img src="/tickets/src/assets/Rectangle 6.png" alt="" class="card-img">
          <p class="card-title">Eurovision 2021 finals!</p>
          <p class="data-card">2021-05-13</p>
          <p class="card-place">Palace of Ukraine</p>
        </div>
      </div>
      <div class="paper">
        <div class="paper1">1</div>
        <div class="paper1">2</div>
        <div class="paper1">3</div>
        <div class="paper1">4</div>
        <div class="paper1">5</div>
        <div class="paper1">...</div>
        <div class="paper1">29</div>
      </div>
    </main>
    <footer>
      <div class="footer">
        <p class="footer-avtor">© 2021 | All Rights Reserved | Developed with ♥ by GoIT Students</p>
      </div>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
